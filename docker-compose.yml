services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cccc_frontend
    ports:
      - "3006:3006"
    depends_on:
      backend:
        condition: service_healthy
      rag:
        condition: service_healthy
    networks:
      - cccc_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cccc_backend
    ports:
      - "5174:5174"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./employment.db
      REDIS_URL: redis://redis:6379/0
      RAG_SERVICE_URL: http://rag:1145
      APP_ENV: production
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
    volumes:
      - ./backend/employment.db:/app/employment.db
      - ./backend/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      rag:
        condition: service_healthy
    networks:
      - cccc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5174/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  rag:
    build:
      context: ./RAG
      dockerfile: Dockerfile
    container_name: cccc_rag
    ports:
      - "1145:1145"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      CHROMA_PERSIST_DIR: /app/chroma_db
      CORS_ORIGINS: http://localhost:3006,http://localhost:5173
      RAG_RELOAD: "false"
    volumes:
      - rag_data:/app/chroma_db
      - ./RAG/chat_history:/app/chat_history
    networks:
      - cccc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1145/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cccc_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - cccc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  cccc_network:
    driver: bridge

volumes:
  rag_data:
  redis_data:
