version: '3.8'

services:
  # ========== 前端服务 ==========
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cccc_frontend
    ports:
      - '3006:3006'
    environment:
      - VITE_PORT=3006
      - VITE_API_PROXY_URL=http://backend:5174
    depends_on:
      backend:
        condition: service_healthy
      rag:
        condition: service_started
    networks:
      - cccc_network
    restart: unless-stopped

  # ========== 后端服务 ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cccc_backend
    ports:
      - '5174:5174'
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./employment.db
      - REDIS_URL=redis://redis:6379/0
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - JWT_SECRET_KEY=resibacksecretkey
      - APP_ENV=production
    volumes:
      - ./backend/employment.db:/app/employment.db
      - ./backend/uploads:/app/uploads
    networks:
      - cccc_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5174/health']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ========== RAG 服务 ==========
  rag:
    build:
      context: ./RAG
      dockerfile: Dockerfile
    container_name: cccc_rag
    ports:
      - '1145:1145'
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - CHROMA_COLLECTION_NAME=rag
      - CORS_ORIGINS=http://localhost:3006,http://localhost:5173
    volumes:
      - ./RAG/chroma_db:/app/chroma_db
      - ./RAG/employment.db:/app/employment.db
    networks:
      - cccc_network
    restart: unless-stopped

  # ========== Redis 服务 ==========
  redis:
    image: redis:7-alpine
    container_name: cccc_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - cccc_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  cccc_network:
    driver: bridge

volumes:
  redis_data:
